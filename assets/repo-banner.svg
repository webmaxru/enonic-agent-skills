<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#15102d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="boxBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(16, 185, 129, 0.1)"/>
      <stop offset="100%" stop-color="rgba(16, 185, 129, 0.02)"/>
    </linearGradient>
    
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <circle cx="1000" cy="100" r="250" fill="#8b5cf6" opacity="0.15" filter="url(#glow)"/>
  <circle cx="150" cy="500" r="200" fill="#3b82f6" opacity="0.15" filter="url(#glow)"/>
  
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <text x="80" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-0.5">
    Enonic XP Agent Skills
  </text>
  <line x1="80" y1="135" x2="250" y2="135" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  
  <g transform="translate(80, 190)">
    <rect x="0" y="0" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M 10 16 L 14 20 L 22 12" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#f8fafc">Enonic API Reference Skill</text>
    
    <rect x="0" y="48" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M 10 64 L 14 68 L 22 60" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#f8fafc">Enonic Content Migration Skill</text>

    <rect x="0" y="96" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M 10 112 L 14 116 L 22 108" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#f8fafc">Enonic Content Type Generator Skill</text>

    <rect x="0" y="144" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M 10 160 L 14 164 L 22 156" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="166" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#f8fafc">Enonic Guillotine Query Builder Skill</text>

    <rect x="0" y="192" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M 10 208 L 14 212 L 22 204" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="214" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#f8fafc">Enonic Next.XP Integration Skill</text>

    <rect x="0" y="240" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M 10 256 L 14 260 L 22 252" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="262" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#f8fafc">Enonic Sandbox Manager Skill</text>

    <rect x="0" y="288" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M 10 304 L 14 308 L 22 300" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#f8fafc">Enonic Webhook Integrator Skill</text>

    <rect x="0" y="336" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M 10 352 L 14 356 L 22 348" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#f8fafc">Enonic Controller Generator Skill</text>
  </g>

  <g transform="translate(620, 190)">
    
    <text x="0" y="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#a78bfa" text-transform="uppercase" letter-spacing="1.5">
      The core Enonic XP development surface is covered:
    </text>
    
    <circle cx="10" cy="45" r="4" fill="#8b5cf6" />
    <text x="25" y="51" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="500" fill="#cbd5e1">
      <tspan x="25" dy="0">Server-side APIs, content modeling, content migration,</tspan>
      <tspan x="25" dy="28">Guillotine GraphQL queries, Next.js headless integration,</tspan>
      <tspan x="25" dy="28">controller generation, webhook/event integrations,</tspan>
      <tspan x="25" dy="28">and local development environment management</tspan>
    </text>


    <line x1="0" y1="140" x2="500" y2="140" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

    <g transform="translate(0, 180)">
      <rect x="0" y="0" width="500" height="150" rx="16" fill="url(#boxBg)" stroke="rgba(16, 185, 129, 0.25)" stroke-width="1.5"/>
      
      <circle cx="36" cy="45" r="12" fill="rgba(16, 185, 129, 0.2)"/>
      <path d="M 31 45 L 35 49 L 42 41" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="65" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="500" fill="#ecfdf5">
        Follows specification updates
      </text>
      <text x="65" y="66" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="500" fill="#ecfdf5">
        from the official sources
      </text>

      <circle cx="36" cy="105" r="12" fill="rgba(16, 185, 129, 0.2)"/>
      <path d="M 31 105 L 35 109 L 42 101" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="65" y="111" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="500" fill="#ecfdf5">
        Manually reviewed, validated, and tested
      </text>
    </g>
  </g>
</svg>
